<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #5B6AB3;
            background: linear-gradient(135deg, #000 0%, #fff 100%);
            background-attachment: fixed;
            padding: 20px;
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        }

        .left-panel {
            width: 40%;
            background: #F0FDFA;
            background: linear-gradient(135deg, #fff 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .logo img {
            width: 200px;
            height: 200px;
        }

        .logo-text {
            font-size: 11px;
            color: #333;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .right-panel {
            width: 60%;
            padding: 45px 35px;
            background: #F5F5F5;
        }

        .right-panel h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .right-panel p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #FFF;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            margin-bottom: 16px;
            outline: none;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #FFF;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            margin-bottom: 16px;
            outline: none;
        }
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #FFF;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus {
            border-color: black;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #000 0%, #fff 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .register-text {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }

        .register-text a {
            color: #4A5568;
            text-decoration: none;
            font-weight: 500;
        }

        @media only screen and (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 15px;
                padding-top: 50px;
            }
            
            .login-container {
                flex-direction: column;
                max-width: 400px;
            }
            
            .left-panel, .right-panel {
                width: 100%;
            }

            .left-panel {
                padding: 30px 20px;
                min-height: 160px;
            }

            .logo {
                width: 90px;
                height: 90px;
            }

            .logo img {
                width: 45px;
                height: 45px;
            }

            .right-panel {
                padding: 25px 20px 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="logo">
                <img src="LogoW.jpg"/>
            </div>
        </div>
        
        <div class="right-panel">
            <h1>login</h1>
            <p>Login</p>
            <form action="wrio.html" method="get">
            <form>
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password"required>
                <button type="submit" class="btn-login">Masuk</button><br><br>
                <button type="reset" class="btn-login">Batal</button>
            </form>
            
            
            
            <div class="register-text">
                Lupa Password? <a href="#">Salah siapa lupa</a>
            </div>
        </div>
    </div>
</body>
</html>
