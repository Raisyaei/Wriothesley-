<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wriothesley Page</title>
<style>

    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  html, body {
    height: 100%;
  }

  /* LOGIN PAGE STYLE */
  #login-page {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000 0%, #fff 100%);
    background-attachment: fixed;
    padding: 20px;
    min-height: 100vh;
  }

  .login-container {
    display: flex;
    width: 100%;
    max-width: 800px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
  }

  .left-panel {
    width: 40%;
    background: linear-gradient(135deg, #fff 0%, #000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .logo {
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .logo img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
  }

  .right-panel {
    width: 60%;
    padding: 45px 35px;
    background: #F5F5F5;
  }

  .right-panel h1 {
    font-size: 26px;
    color: #333;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .right-panel p {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    background: white;
    margin-bottom: 16px;
    outline: none;
  }

  input:focus {
    border-color: black;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #000 0%, #555 100%);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .register-text {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    color: #666;
  }

  .register-text a {
    color: #4A5568;
    text-decoration: none;
    font-weight: 500;
  }

  /* WRIO PAGE STYLE */
  #wrio-page {
    display: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #000 0%, #1a1a1a 40%, #fff 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 40px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #aaa;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    background: linear-gradient(90deg, #fff, #888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
    margin-bottom: 50px;
  }

  h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .section-desc {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 30px;
  }

  .card {
    margin-bottom: 40px;
    border-bottom: 1px solid #333;
    padding-bottom: 30px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .card img {
    width: 100%;
    border-radius: 12px;
    display: block;
    filter: grayscale(100%) contrast(1.1);
  }

  .card img:hover {
    filter: grayscale(0%) contrast(1);
    transition: 0.4s ease;
  }

  .back-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  /* RESPONSIVE */
  @media only screen and (max-width: 768px) {
    .login-container {
      flex-direction: column;
      max-width: 400px;
    }
    
    .left-panel, .right-panel {
      width: 100%;
    }

    .left-panel {
      padding: 30px 20px;
      min-height: 160px;
    }

    .logo {
      width: 90px;
      height: 90px;
    }

    .logo img {
      width: 80px;
      height: 80px;
    }

    .right-panel {
      padding: 25px 20px 30px 20px;
    }
  }
</style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div id="login-page">
  <div class="login-container">
    <div class="left-panel">
      <div class="logo">
        <img src="LogoW.jpg" alt="Logo"/>
      </div>
    </div>
    
    <div class="right-panel">
      <h1>login</h1>
      <p>Login untuk masuk</p>
      <form id="login-form">
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn-login">Masuk</button>
        <button type="reset" class="btn-login" style="background: #888;">Batal</button>
      </form>
      
      <div class="register-text">
        Lupa Password? <a href="#">Salah siapa lupa</a>
      </div>
    </div>
  </div>
</div>

<!-- HALAMAN WRIO -->
<div id="wrio-page">
  <div class="header">Wriothesley</div>

  <div class="subtitle">Wriothesley</div>
  <h1>Deskripsi<br>Char</h1>
  <p class="desc">
   Wriothesley sebagai administrator. Sosok yang rendah hati dan dapat diandalkan.
  </p>

  <h2>Cryo Catalyst</h2>
  <p class="section-desc">Galery</p>

  <div class="card">
    <div class="card-title">Wrio</div>
    <img src="Wr2.jpg" alt="Wr2">
  </div>

  <div class="card">
    <div class="card-title">Armor</div>
    <img src="Wr3.jpg" alt="Wr3">
  </div>

  <button class="back-btn" onclick="logout()">Kembali ke Login</button>
</div>

<script>
  const loginForm = document.getElementById('login-form');
  const loginPage = document.getElementById('login-page');
  const wrioPage = document.getElementById('wrio-page');

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault(); 
    loginPage.style.display = 'none';
    wrioPage.style.display = 'block';
  });

  function logout() {
    wrioPage.style.display = 'none';
    loginPage.style.display = 'flex';
    loginForm.reset();
  }
</script>

</body>
</html>
