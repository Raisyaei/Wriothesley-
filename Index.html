<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Html+Css</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, #000 0%, #1a1a1a 40%, #fff 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 40px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #aaa;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    background: linear-gradient(90deg, #fff, #888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
    margin-bottom: 50px;
  }

  h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .section-desc {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 30px;
  }

  .card {
    margin-bottom: 40px;
    border-bottom: 1px solid #333;
    padding-bottom: 30px;
  }

  .card-num {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .card img {
    width: 100%;
    border-radius: 12px;
    display: block;
    filter: grayscale(100%) contrast(1.1);
  }

  .card img:hover {
    filter: grayscale(0%) contrast(1);
    transition: 0.4s ease;
  }
</style>
</head>
<body>

  <div class="header">Wriothesley</div>

  <div class="subtitle">Wriothesley</div>
  <h1>Deskripsi<br>Char</h1>
  <p class="desc">
   Wriothesley sebagai administrator Benteng Meropide, ia dianugerahi gelar kehormatan tertinggi Fontaine, yaitu "Adipati." Sosok yang rendah hati dan dapat diandalkan.

  </p>

  <h2>Cryo Catalyst </h2>
  <p class="section-desc">Galery</p>

  <div class="card">
    <div class="card-num"></div>
    <div class="card-title">Wrio</div>
    <img src="Wr2.jpg" alt="Wr2">
  </div>

  <div class="card">
    <div class="card-num"></div>
    <div class="card-title">Armor</div>
    <img src="Wr3.jpg" alt="Wr3">
  </div>

</body>
</html>
